name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Show files
        run: ls -la

      - name: Build APK
        run: |
          cd PhonePcMessenger_FIXED/android-app
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhonePcMessenger-debug-apk
          path: PhonePcMessenger_FIXED/android-app/app/build/outputs/apk/debug/app-debug.apk
