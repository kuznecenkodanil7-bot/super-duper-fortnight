name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Download project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Show repository files
        run: |
          echo "ROOT FILES:"
          ls -la
          echo ""
          echo "ALL FOLDERS:"
          find . -maxdepth 4 -type d

      - name: Find Android project
        run: |
          ANDROID_DIR=$(find . -type d -name "android-app" | head -n 1)

          if [ -z "$ANDROID_DIR" ]; then
            echo "ERROR: android-app folder not found"
            echo "Repository structure:"
            find . -maxdepth 5 -type d
            exit 1
          fi

          echo "Found Android project: $ANDROID_DIR"
          echo "ANDROID_DIR=$ANDROID_DIR" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhonePcMessenger-debug-apk
          path: "**/app/build/outputs/apk/debug/*.apk"
